# ============================================================
# DDF CI/CD Pipeline
#
# 触发: push 到 main / PR → main
# 包含: 前端构建 → 后端构建 → Docker 镜像 → 部署
# ============================================================

name: DDF CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ---- 前端: 构建 + Lint ----
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx vue-cli-service lint || true

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/dist/

  # ---- 后端: Prisma 验证 + 构建 ----
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Prisma Schema Validation
        run: npx prisma validate

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-${{ hashFiles('server/package-lock.json') }}

  # ---- 引擎: DSL 校验 ----
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate DSL files
        run: node poc.js

      - name: Generate code
        run: node generator/index.js --out ../generated

  # ---- Docker 构建（仅在 main 分支） ----
  docker:
    if: github.ref == 'refs/heads/main'
    needs: [frontend, backend, engine]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose -f deploy/docker-compose.yml build

      - name: Save Docker images
        run: |
          docker save ddf-server:latest | gzip > ddf-server.tar.gz
          docker save ddf-app:latest | gzip > ddf-app.tar.gz

      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            ddf-server.tar.gz
            ddf-app.tar.gz
