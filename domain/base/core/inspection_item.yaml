# domain/base/core/inspection_item.yaml
domain: base.inspection_item
name: 检验项目
version: 1.0.0
description: 检验标准定义，含规格上下限和数据类型

entities:
  - name: InspectionItem
    label: 检验项目
    table: inspection_item
    fields:
      - name: id
        type: integer
        label: ID
        primary_key: true
        generate: true
        sequence: { strategy: db }
      - name: item_code
        type: string
        label: 项目编码
        max_length: 32
        required: true
        unique: true
      - name: item_name
        type: string
        label: 项目名称
        max_length: 128
        required: true
      - name: quality_category_id
        type: relation
        label: 质量分类
        relation: QualityCategory
      - name: data_type
        type: enum
        label: 数据类型
        values: number, text, boolean, enum
        default: number
      - name: unit
        type: string
        label: 单位
        max_length: 16
        description: 如 mm, kg, ℃
      - name: spec_min
        type: float
        label: 规格下限
      - name: spec_max
        type: float
        label: 规格上限
      - name: options
        type: string
        label: 可选值
        max_length: 500
        description: 枚举类型时使用，逗号分隔
      - name: method
        type: string
        label: 检验方法
        max_length: 256
        description: 如 "游标卡尺测量"、"目视检查"
      - name: status
        type: enum
        label: 状态
        values: active, inactive
        default: active
        status_field: true
      - name: created_at
        type: datetime
        label: 创建时间
        auto_fill: NOW()
        read_only: true
      - name: updated_at
        type: datetime
        label: 更新时间
        auto_fill: NOW_ON_UPDATE

    list_view:
      columns:
        - field: item_code
          label: 项目编码
        - field: item_name
          label: 项目名称
        - field: quality_category_id
          label: 质量分类
        - field: data_type
          label: 数据类型
          formatter: tag
        - field: unit
          label: 单位
        - field: spec_min
          label: 规格下限
          align: right
        - field: spec_max
          label: 规格上限
          align: right

    permissions:
      read:      [quality_inspector, admin]
      create:    [quality_inspector, admin]
      write:     [quality_inspector, admin]
      delete:    [admin]
